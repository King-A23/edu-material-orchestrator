name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall src tools skill

      - name: Run unit tests
        run: python -m pytest tests/unit -q

      - name: Run integration tests
        run: python -m pytest tests/integration -q

      - name: Run demo smoke test
        run: python -m edu_materials demo --output-dir out/demo-smoke

      - name: Check license boundary
        run: python tools/check_license_boundary.py

      - name: Verify release artifacts
        run: python tools/verify_release_artifacts.py
