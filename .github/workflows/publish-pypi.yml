name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-distributions:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

      - name: Check license boundary
        run: python tools/check_license_boundary.py

      - name: Verify release artifacts
        run: python tools/verify_release_artifacts.py

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/edu-materials/
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/edu-materials/
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
