name: release-skill-bundle

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release artifacts
        run: python tools/verify_release_artifacts.py

      - name: Build skill bundle
        run: python tools/build_skill_bundle.py

      - name: Archive skill bundle
        run: |
          python - <<'PY'
          import shutil
          shutil.make_archive("skill-dist/edu-materials", "zip", "skill-dist", "edu-materials")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: edu-materials-skill-bundle
          path: skill-dist/edu-materials.zip

      - name: Attach bundle to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: skill-dist/edu-materials.zip
