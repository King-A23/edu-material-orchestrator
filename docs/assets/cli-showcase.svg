<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">edu_materials CLI showcase</title>
  <desc id="desc">A before and after overview of the edu_materials pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#eef3ea"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="60" y="52" width="1080" height="616" rx="30" fill="#ffffff" opacity="0.7"/>
  <text x="88" y="120" fill="#17324d" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    From raw course files to agent-ready study artifacts
  </text>
  <text x="88" y="162" fill="#4c6478" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Local-first CLI demo: synthetic input, Markdown handout, DOCX export, QA report, and source traceability.
  </text>

  <rect x="88" y="220" width="280" height="360" rx="24" fill="url(#card)" stroke="#d8e0e8"/>
  <text x="116" y="272" fill="#17324d" font-family="Consolas, monospace" font-size="24" font-weight="700">Before</text>
  <rect x="116" y="304" width="224" height="66" rx="14" fill="#f4f1e8"/>
  <text x="138" y="346" fill="#5e4c1b" font-family="Consolas, monospace" font-size="21">slides_week3.pptx</text>
  <rect x="116" y="390" width="224" height="66" rx="14" fill="#edf5ff"/>
  <text x="138" y="432" fill="#244f77" font-family="Consolas, monospace" font-size="21">worksheet_scan.pdf</text>
  <rect x="116" y="476" width="224" height="66" rx="14" fill="#eef7ed"/>
  <text x="138" y="518" fill="#1d5a37" font-family="Consolas, monospace" font-size="21">homework.docx</text>
  <text x="116" y="566" fill="#5d6e7e" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Unstructured teaching assets
  </text>

  <rect x="432" y="238" width="336" height="324" rx="28" fill="#17324d"/>
  <text x="468" y="294" fill="#ffffff" font-family="Consolas, monospace" font-size="24" font-weight="700">
    edu-materials demo
  </text>
  <text x="468" y="340" fill="#d6e4f2" font-family="Consolas, monospace" font-size="18">
    edu-materials demo
  </text>
  <text x="468" y="378" fill="#d6e4f2" font-family="Consolas, monospace" font-size="18">
    ├─ synthetic_agent_demo.pptx
  </text>
  <text x="468" y="416" fill="#d6e4f2" font-family="Consolas, monospace" font-size="18">
    ├─ demo_handout.md
  </text>
  <text x="468" y="454" fill="#d6e4f2" font-family="Consolas, monospace" font-size="18">
    ├─ demo_handout.docx
  </text>
  <text x="468" y="492" fill="#d6e4f2" font-family="Consolas, monospace" font-size="18">
    └─ quality_report.json
  </text>
  <text x="468" y="536" fill="#9fc3e2" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    One command. No provider CLI required.
  </text>

  <rect x="832" y="220" width="280" height="360" rx="24" fill="url(#card)" stroke="#d8e0e8"/>
  <text x="860" y="272" fill="#17324d" font-family="Consolas, monospace" font-size="24" font-weight="700">After</text>
  <rect x="860" y="304" width="224" height="66" rx="14" fill="#fff6e8"/>
  <text x="882" y="346" fill="#7a4d11" font-family="Consolas, monospace" font-size="21">Markdown handout</text>
  <rect x="860" y="390" width="224" height="66" rx="14" fill="#f0ebff"/>
  <text x="882" y="432" fill="#4d3f8c" font-family="Consolas, monospace" font-size="21">DOCX export</text>
  <rect x="860" y="476" width="224" height="66" rx="14" fill="#ebf7f3"/>
  <text x="882" y="518" fill="#1d6c54" font-family="Consolas, monospace" font-size="21">QA + manifest</text>
  <text x="860" y="566" fill="#5d6e7e" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Structured, traceable outputs
  </text>

  <path d="M372 400H416" stroke="#8ea4b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M784 400H820" stroke="#8ea4b8" stroke-width="8" stroke-linecap="round"/>
  <polygon points="416,387 440,400 416,413" fill="#8ea4b8"/>
  <polygon points="820,387 844,400 820,413" fill="#8ea4b8"/>
</svg>
